<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citext</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:Inter,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px;margin:0 auto;" cellspacing="0" cellpadding="0">
          <tr>
            <td style="padding:0 0 24px 0;text-align:center;">
              <a href="{{siteUrl}}" style="text-decoration:none;color:#09090b;display:inline-block;">
                <img src="{{siteUrl}}/images/logo.png" alt="Citext Logo" width="120" style="display:block;margin:0 auto;border:0;outline:none;text-decoration:none;" />
              </a>
            </td>
          </tr>
          <tr>
            <td style="background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:40px 32px;">
              <p style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:#09090b;">Citext daveti</p>
              <p style="margin:0;font-size:15px;line-height:1.6;color:#3f3f46;">
                Bu şablon yer tutucudur. Kurumsal davet akışları için içerik yönetim panelinden güncelleyin.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:24px auto 0 auto;">
                <tr>
                  <td style="border-radius:8px;background-color:#2596be;">
                    <a href="{{siteUrl}}" target="_blank" style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:600;color:#fff;text-decoration:none;">citext.net</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 8px;text-align:center;font-size:12px;color:#71717a;">
              <a href="mailto:{{supportEmail}}" style="color:#1f7fa1;text-decoration:underline;">{{supportEmail}}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
